services:
  server:
    build: ./server
    container_name: server
    ports:
      - "1053:1053"
    networks:
      - pbl-net

  sensor:
    build: ./sensor
    depends_on:
      - server
    networks:
      - pbl-net
    tty: true

  atuador:
    build: ./atuador
    depends_on:
      - server
    networks:
      - pbl-net

  cliente:
    build: ./cliente
    depends_on:
      - server
    networks:
      - pbl-net
    stdin_open: true
    tty: true

networks:
  pbl-net:
    driver: bridge